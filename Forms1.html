<!DOCTYPE html>
<html>
<head>
	<title>Forms1</title>
</head>
<body>
	<fieldset>
		<legend>Form 1 HTML</legend>
		<form>
			Name</br>
			<input type="text" required minlength="5" maxlength="10"></br></br>
		    Quantity</br>
			<input type="number" min="1" max="200">
		</br></br>

	        Date</br>
			<input type="Date">
		</br></br>

		    Time</br>
			<input type="Time">
		</br></br>

	        Week</br>
			<input type="week">
		</br></br>

	        Month</br>
			<input type="month">
		</br></br>

	        Color</br>
			<input type="Color">
		</br></br>

	        Url</br>
			<input type="url">
		</br></br>

		    Range</br>
			<input type="range">
		</br></br>

		<input type="text" list="Course"/>
		<datalist id="Course">
			<option>HTML</option>
			<option>PHP</option>
			<option>JAVA</option>
			<option>C++</option>
		</datalist>
		</br></br>

		<button>Save</button>
		<input type="reset" value="Reset"/></br>
		</form>
	</fieldset>
</body>
</html>
